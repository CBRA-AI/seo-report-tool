<!DOCTYPE html>
<html>
<head>
  <title>SEO Report Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>SEO Report Tool 🚀</h1>

<input id="url" placeholder="https://cbraindia.com/">
<button onclick="generate()">Generate Report</button>

<h2>Overview</h2>
<div id="summary"></div>

<h2>Traffic Chart</h2>
<canvas id="trafficChart"></canvas>

<h2>Keyword Ranking</h2>
<table border="1">
  <thead>
    <tr>
      <th>Keyword</th>
      <th>Position</th>
      <th>Page</th>
    </tr>
  </thead>
  <tbody id="keywordTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
